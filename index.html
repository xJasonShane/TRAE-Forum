<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="TRAE 论坛个人帖子展示，支持分类筛选、关键词搜索、多视图切换">
<meta name="theme-color" content="#4F6EF7">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>我的TRAE论坛帖子</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header" id="site-header">
  <div class="header-inner">
    <img class="header-avatar" id="avatar" src="" alt="" style="display:none">
    <div class="header-info">
      <div class="header-name" id="username">加载中...</div>
      <div class="header-badges" id="badges"></div>
    </div>
    <div class="header-stats" id="stats-bar" style="display:none">
      <div class="header-stat"><div class="header-stat-num" id="stat-posts">0</div><div class="header-stat-label">帖子</div></div>
      <div class="header-stat"><div class="header-stat-num" id="stat-views">0</div><div class="header-stat-label">浏览</div></div>
      <div class="header-stat"><div class="header-stat-num" id="stat-likes">0</div><div class="header-stat-label">点赞</div></div>
      <div class="header-stat"><div class="header-stat-num" id="stat-cats">0</div><div class="header-stat-label">分类</div></div>
    </div>
    <div class="header-actions">
      <button class="refresh-btn" id="refresh-btn" title="刷新数据 (R)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <button class="theme-toggle" id="theme-toggle" title="切换主题 (D)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="export-btn" id="stats-toggle" title="统计图表 (S)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        统计
      </button>
      <div style="position:relative">
        <button class="export-btn" id="export-menu-btn" title="导出数据">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导出
        </button>
        <div id="export-dropdown" style="display:none;position:absolute;right:0;top:100%;margin-top:4px;background:var(--bg-white);border:1px solid var(--border);border-radius:8px;padding:4px;box-shadow:var(--shadow-md);z-index:200;min-width:120px">
          <button id="export-csv" style="display:block;width:100%;padding:8px 12px;border:none;background:none;text-align:left;font-size:0.8rem;color:var(--text-secondary);cursor:pointer;border-radius:4px">📄 导出 CSV</button>
          <button id="export-json" style="display:block;width:100%;padding:8px 12px;border:none;background:none;text-align:left;font-size:0.8rem;color:var(--text-secondary);cursor:pointer;border-radius:4px">📋 导出 JSON</button>
        </div>
      </div>
    </div>
  </div>
</header>

<nav class="toolbar" id="toolbar" style="display:none">
  <div class="toolbar-inner">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="search-input" placeholder="搜索帖子标题、内容或分类...  按 / 聚焦">
      <button class="search-clear" id="search-clear" title="清除搜索 (Esc)">&times;</button>
    </div>
    <span class="search-results" id="search-results" style="display:none"></span>
    <div class="cat-tabs" id="cat-list"></div>
    <div class="toolbar-actions">
      <select class="sort-select" id="sort-select">
        <option value="newest">最新发布</option>
        <option value="oldest">最早发布</option>
        <option value="popular">最多浏览</option>
        <option value="likes">最多点赞</option>
        <option value="replies">最多回复</option>
      </select>
      <div class="view-toggle">
        <button class="view-btn active" id="view-columns" title="分类视图 (1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="view-btn" id="view-flat" title="卡片视图 (2)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="7"/><rect x="3" y="14" width="18" height="7"/></svg>
        </button>
        <button class="view-btn" id="view-calendar" title="日历视图 (3)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </button>
      </div>
    </div>
  </div>
</nav>

<main>
  <div class="container">
    <!-- 统计图表面板 -->
    <div class="stats-panel" id="stats-panel">
      <div class="stats-panel-header">
        <span class="stats-panel-title">📊 数据统计</span>
        <button class="stats-panel-close" id="stats-close" title="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="stats-charts">
        <div class="chart-container">
          <canvas id="chart-categories"></canvas>
        </div>
        <div class="chart-container">
          <canvas id="chart-timeline"></canvas>
        </div>
      </div>
    </div>

    <div id="content">
      <div class="skeleton-content">
        <div class="skeleton-columns">
          <div class="skeleton-column">
            <div class="skeleton-col-header">
              <div class="skeleton skeleton-col-dot"></div>
              <div class="skeleton skeleton-col-name"></div>
              <div class="skeleton skeleton-col-count"></div>
            </div>
            <div class="skeleton-col-body">
              <div class="skeleton-item">
                <div class="skeleton skeleton-item-title"></div>
                <div class="skeleton skeleton-item-title-short"></div>
                <div class="skeleton-item-meta">
                  <div class="skeleton skeleton-meta-item"></div>
                  <div class="skeleton skeleton-meta-item"></div>
                  <div class="skeleton skeleton-meta-item"></div>
                </div>
              </div>
              <div class="skeleton-item">
                <div class="skeleton skeleton-item-title"></div>
                <div class="skeleton skeleton-item-title-short"></div>
                <div class="skeleton-item-meta">
                  <div class="skeleton skeleton-meta-item"></div>
                  <div class="skeleton skeleton-meta-item"></div>
                  <div class="skeleton skeleton-meta-item"></div>
                </div>
              </div>
              <div class="skeleton-item">
                <div class="skeleton skeleton-item-title"></div>
                <div class="skeleton skeleton-item-title-short"></div>
                <div class="skeleton-item-meta">
                  <div class="skeleton skeleton-meta-item"></div>
                  <div class="skeleton skeleton-meta-item"></div>
                  <div class="skeleton skeleton-meta-item"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="skeleton-column">
            <div class="skeleton-col-header">
              <div class="skeleton skeleton-col-dot"></div>
              <div class="skeleton skeleton-col-name"></div>
              <div class="skeleton skeleton-col-count"></div>
            </div>
            <div class="skeleton-col-body">
              <div class="skeleton-item">
                <div class="skeleton skeleton-item-title"></div>
                <div class="skeleton skeleton-item-title-short"></div>
                <div class="skeleton-item-meta">
                  <div class="skeleton skeleton-meta-item"></div>
                  <div class="skeleton skeleton-meta-item"></div>
                  <div class="skeleton skeleton-meta-item"></div>
                </div>
              </div>
              <div class="skeleton-item">
                <div class="skeleton skeleton-item-title"></div>
                <div class="skeleton skeleton-item-title-short"></div>
                <div class="skeleton-item-meta">
                  <div class="skeleton skeleton-meta-item"></div>
                  <div class="skeleton skeleton-meta-item"></div>
                  <div class="skeleton skeleton-meta-item"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="skeleton-column">
            <div class="skeleton-col-header">
              <div class="skeleton skeleton-col-dot"></div>
              <div class="skeleton skeleton-col-name"></div>
              <div class="skeleton skeleton-col-count"></div>
            </div>
            <div class="skeleton-col-body">
              <div class="skeleton-item">
                <div class="skeleton skeleton-item-title"></div>
                <div class="skeleton skeleton-item-title-short"></div>
                <div class="skeleton-item-meta">
                  <div class="skeleton skeleton-meta-item"></div>
                  <div class="skeleton skeleton-meta-item"></div>
                  <div class="skeleton skeleton-meta-item"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <p>数据来源于 <a href="https://forum.trae.cn/" target="_blank" rel="noopener">TRAE 官方中文社区</a> · 每2小时自动更新</p>
  <p style="margin-top:3px" id="update-time"></p>
</footer>

<button class="back-top" id="back-top" title="回到顶部">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<div class="shortcut-hint" id="shortcut-hint">
  <span class="shortcut-key"><kbd>/</kbd> 搜索</span>
  <span class="shortcut-key"><kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> 视图</span>
  <span class="shortcut-key"><kbd>D</kbd> 主题</span>
  <span class="shortcut-key"><kbd>S</kbd> 统计</span>
  <span class="shortcut-key"><kbd>R</kbd> 刷新</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="app.js"></script>

<script>
// 导出菜单下拉
(function() {
  var btn = document.getElementById('export-menu-btn');
  var dropdown = document.getElementById('export-dropdown');
  var timer;
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
  });
  document.addEventListener('click', function() {
    dropdown.style.display = 'none';
  });
  dropdown.addEventListener('click', function(e) {
    e.stopPropagation();
    dropdown.style.display = 'none';
  });

  // 显示快捷键提示
  var hint = document.getElementById('shortcut-hint');
  setTimeout(function() { hint.classList.add('show'); }, 2000);
  setTimeout(function() { hint.classList.remove('show'); }, 8000);
})();
</script>
</body>
</html>
